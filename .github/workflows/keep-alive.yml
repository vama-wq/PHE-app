name: Keep Render app awake

# Render's free tier sleeps the service after ~15 min of no traffic, which makes
# the first visit each day slow (cold start). This pings the app on a schedule so
# it never goes idle long enough to sleep.
#
# Notes:
# - The repo is public, so Actions minutes are free/unlimited.
# - GitHub-scheduled jobs can be delayed during high load, so we ping every 10
#   min (comfortably under the 15-min sleep window) to absorb some slack.
# - We hit the Render origin directly (phe-app.onrender.com) because that's what
#   actually needs waking; the custom domain is pinged too to keep the edge warm.
# - The job never fails on a non-200 (a cold start may briefly return 502); the
#   point is simply to send a request that wakes the container.

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch: {}        # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app to prevent free-tier sleep
        run: |
          for url in \
            "https://phe-app.onrender.com/healthz" \
            "https://www.peenaheatelements.com/healthz"; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 20 --max-time 120 -L "$url" || echo "000")
            echo "$url -> HTTP $code"
          done
          echo "Keep-alive ping complete."
